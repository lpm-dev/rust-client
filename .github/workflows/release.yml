name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write      # Required for npm OIDC trusted publishing (no token needed)

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: lpm-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: lpm-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lpm-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lpm-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: lpm-win32-x64.exe

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/lpm-rs ${{ matrix.binary }}
          chmod +x ${{ matrix.binary }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/lpm-rs.exe ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: binaries
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true

  publish-npm-platform:
    name: Publish npm Platform Packages
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: binaries
          merge-multiple: true

      - name: Publish platform packages via trusted publishers (OIDC, tokenless)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          for platform in darwin-arm64 darwin-x64 linux-x64 linux-arm64; do
            echo "Publishing @lpm-registry/cli-${platform}@${VERSION}..."
            cd npm/cli-${platform}
            cp ../../binaries/lpm-${platform} ./lpm
            chmod +x ./lpm
            npm version "$VERSION" --no-git-tag-version --allow-same-version
            npx npm@11 publish --provenance --access public
            cd ../..
          done

          # Windows (different binary name)
          echo "Publishing @lpm-registry/cli-win32-x64@${VERSION}..."
          cd npm/cli-win32-x64
          cp ../../binaries/lpm-win32-x64.exe ./lpm.exe
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npx npm@11 publish --provenance --access public

  publish-npm-wrapper:
    name: Publish @lpm-registry/cli wrapper
    needs: publish-npm-platform
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout CLI wrapper repo
        uses: actions/checkout@v5
        with:
          repository: lpm-dev/cli
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Bump version and optionalDependencies, then publish
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Update wrapper version
          npm version "$VERSION" --no-git-tag-version --allow-same-version

          # Update optionalDependencies + repository to match this repo
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const platforms = [
              '@lpm-registry/cli-darwin-arm64',
              '@lpm-registry/cli-darwin-x64',
              '@lpm-registry/cli-linux-x64',
              '@lpm-registry/cli-linux-arm64',
              '@lpm-registry/cli-win32-x64'
            ];
            for (const p of platforms) {
              if (pkg.optionalDependencies[p]) {
                pkg.optionalDependencies[p] = '$VERSION';
              }
            }
            // Point repository to rust-client (where the release runs)
            // so npm provenance links to the correct source repo
            pkg.repository = {
              type: 'git',
              url: 'https://github.com/lpm-dev/rust-client'
            };
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, '\t') + '\n');
          "

          echo "Publishing @lpm-registry/cli@${VERSION}..."
          npx npm@11 publish --provenance --access public --ignore-scripts

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Compute SHA256 checksums
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BASE="https://github.com/lpm-dev/rust-client/releases/download/${VERSION}"

          for binary in lpm-darwin-arm64 lpm-darwin-x64 lpm-linux-arm64 lpm-linux-x64; do
            curl -fsSL "${BASE}/${binary}" -o "${binary}"
          done

          echo "SHA_DARWIN_ARM64=$(sha256sum lpm-darwin-arm64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_DARWIN_X64=$(sha256sum lpm-darwin-x64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_LINUX_ARM64=$(sha256sum lpm-linux-arm64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_LINUX_X64=$(sha256sum lpm-linux-x64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: lpm-dev/homebrew-lpm
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ env.VERSION }}",
              "sha_darwin_arm64": "${{ env.SHA_DARWIN_ARM64 }}",
              "sha_darwin_x64": "${{ env.SHA_DARWIN_X64 }}",
              "sha_linux_arm64": "${{ env.SHA_LINUX_ARM64 }}",
              "sha_linux_x64": "${{ env.SHA_LINUX_X64 }}"
            }

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: lpm-darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: lpm-darwin-arm64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lpm-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: lpm-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: lpm-win32-x64.exe

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo 'CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc' >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/lpm-rs ${{ matrix.binary }}
          chmod +x ${{ matrix.binary }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/lpm-rs.exe ${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: binaries
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true

  update-homebrew:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Compute SHA256 checksums
        run: |
          VERSION="${GITHUB_REF_NAME}"
          BASE="https://github.com/lpm-dev/rust-client/releases/download/${VERSION}"

          for binary in lpm-darwin-arm64 lpm-darwin-x64 lpm-linux-arm64 lpm-linux-x64; do
            curl -fsSL "${BASE}/${binary}" -o "${binary}"
          done

          echo "SHA_DARWIN_ARM64=$(sha256sum lpm-darwin-arm64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_DARWIN_X64=$(sha256sum lpm-darwin-x64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_LINUX_ARM64=$(sha256sum lpm-linux-arm64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "SHA_LINUX_X64=$(sha256sum lpm-linux-x64 | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "VERSION=${VERSION#v}" >> $GITHUB_ENV

      - name: Update Homebrew tap
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: lpm-dev/homebrew-lpm
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ env.VERSION }}",
              "sha_darwin_arm64": "${{ env.SHA_DARWIN_ARM64 }}",
              "sha_darwin_x64": "${{ env.SHA_DARWIN_X64 }}",
              "sha_linux_arm64": "${{ env.SHA_LINUX_ARM64 }}",
              "sha_linux_x64": "${{ env.SHA_LINUX_X64 }}"
            }

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress CI for the same branch (don't waste minutes)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin to exact version so CI is deterministic. Bump after running
  # `cargo clippy -- -D warnings` locally and fixing all lints.
  RUST_TOOLCHAIN: "1.94.0"
  # Opt in to Node.js 24 for all JavaScript actions ahead of GitHub's
  # 2026-06-02 forced-default (Node 20 removal on 2026-09-16). Suppresses
  # the "Node.js 20 actions are deprecated" deprecation annotation on
  # every run. Safe no-op after the forced-default date.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-lint-${{ env.RUST_TOOLCHAIN }}-

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      # Security: fancy-regex uses backtracking which is vulnerable to ReDoS.
      # All regex in lpm-security scans untrusted input (npm package source code).
      # The `regex` crate guarantees linear-time matching (Thompson NFA).
      # If fancy-regex appears as a dependency, it MUST be reviewed.
      - name: Reject fancy-regex (ReDoS prevention)
        run: |
          if grep -r 'fancy-regex' crates/*/Cargo.toml; then
            echo "::error::fancy-regex found in Cargo.toml dependencies. The regex crate (linear-time) must be used for scanning untrusted input. See phase-25-todo.md §S1."
            exit 1
          fi
          echo "✓ No fancy-regex dependencies found"

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Build
        run: cargo build --workspace

      - name: Test (unit + integration, excluding workflow tests)
        run: cargo nextest run --workspace --exclude lpm-integration-tests --no-fail-fast

  bench:
    name: Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run benchmarks manually or on release tags — not on every push
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bench-${{ env.RUST_TOOLCHAIN }}-

      - name: Run benchmarks
        run: cargo bench -p lpm-security 2>&1 | grep -E '^test |^Benchmarking' | tee bench-output.txt

      - name: Verify benchmarks ran
        run: |
          if [ ! -s bench-output.txt ]; then
            echo "::warning::No benchmark output captured — criterion may need configuration"
            exit 0
          fi
          echo "Benchmarks completed:"
          cat bench-output.txt
